name: Config Smoke Tests

on:
  push:
    branches: [aj-attack, aj-test, main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/scripts/**'
      - 'tests/integration/**'
  pull_request:
    branches: [main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/scripts/**'
      - 'tests/integration/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Smoke test configs
        run: PYTHONPATH=. python tests/scripts/ci_smoke_test.py

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Strategy pipeline integration tests
        run: python -m pytest tests/integration/test_strategy_pipeline.py -v --tb=short
