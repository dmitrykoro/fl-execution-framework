name: Config Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [aj-attack, aj-test, main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.10'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}
          key: python-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test configs
        run: PYTHONPATH=. python tests/scripts/ci_smoke_test.py

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.10'

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}
          key: python-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Strategy pipeline integration tests
        run: python -m pytest tests/integration/test_strategy_pipeline.py -v --tb=short
