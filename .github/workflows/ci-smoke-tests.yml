name: Config Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [aj-attack, aj-test, main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'config/**'
      - 'src/**'
      - 'tests/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Smoke test configs
        run: PYTHONPATH=. python tests/scripts/ci_smoke_test.py

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Strategy pipeline integration tests
        run: python -m pytest tests/integration/test_strategy_pipeline.py -v --tb=short
